x-otel-app-env: &otel-app-env
  GOCHAT_DEPLOYMENT_ENV: docker-compose
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf

x-go-service-logging: &go-service-logging
  driver: fluentd
  options:
    fluentd-address: localhost:${OTEL_COLLECTOR_FLUENTD_PORT:-24224}
    fluentd-async: "true"
    tag: "{{.Name}}"

services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.4}
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.idleTimeout=120s
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=0s
      - --entrypoints.web.transport.respondingTimeouts.writeTimeout=0s
      - --serversTransport.forwardingTimeouts.idleConnTimeout=120s
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      default:
        aliases:
          - ${APP_HOST}
          - ${TRAEFIK_STORAGE_ALIAS}
          - ${TRAEFIK_MINIO_CONSOLE_ALIAS}

  ui:
    image: ${GOCHAT_IMAGE_UI}
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.ui.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.ui.entrypoints=web
      - traefik.http.services.ui.loadbalancer.server.port=80

  auth:
    image: ${GOCHAT_IMAGE_AUTH}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/auth_config.yaml:/dist/config.yaml:ro
      - ./templates/email_notify.tmpl:/dist/email_notify.tmpl:ro
      - ./templates/password_reset.tmpl:/dist/password_reset.tmpl:ro
    depends_on:
      keydb:
        condition: service_started
      citus-master:
        condition: service_healthy
      migrations-postgres:
        condition: service_completed_successfully
      migrations-cassandra:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=Host(`${APP_HOST}`) && PathPrefix(`/api/v1/auth`)
      - traefik.http.routers.auth.priority=120
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.services.auth.loadbalancer.server.port=3100

  api:
    image: ${GOCHAT_IMAGE_API}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/api_config.yaml:/dist/config.yaml:ro
    depends_on:
      scylla:
        condition: service_healthy
      keydb:
        condition: service_started
      nats:
        condition: service_started
      indexer-nats:
        condition: service_started
      auth:
        condition: service_started
      etcd:
        condition: service_started
      migrations-postgres:
        condition: service_completed_successfully
      migrations-cassandra:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${APP_HOST}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.api.priority=10
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=3100

  attachments:
    image: ${GOCHAT_IMAGE_ATTACHMENTS}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/attachments_config.yaml:/dist/config.yaml:ro
    depends_on:
      scylla:
        condition: service_healthy
      keydb:
        condition: service_started
      nats:
        condition: service_started
      citus-master:
        condition: service_healthy
      migrations-postgres:
        condition: service_completed_successfully
      migrations-cassandra:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.attachments.rule=Host(`${APP_HOST}`) && (PathPrefix(`/api/v1/upload`) || PathPrefix(`/emoji`))
      - traefik.http.routers.attachments.priority=130
      - traefik.http.routers.attachments.entrypoints=web
      - traefik.http.services.attachments.loadbalancer.server.port=3200

  ws:
    image: ${GOCHAT_IMAGE_WS}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/ws_config.yaml:/dist/config.yaml:ro
    depends_on:
      scylla:
        condition: service_healthy
      keydb:
        condition: service_started
      nats:
        condition: service_started
      citus-master:
        condition: service_healthy
      migrations-postgres:
        condition: service_completed_successfully
      migrations-cassandra:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.ws.rule=Host(`${APP_HOST}`) && PathPrefix(`/ws`)
      - traefik.http.routers.ws.middlewares=ws-stripprefix
      - traefik.http.middlewares.ws-stripprefix.stripprefix.prefixes=/ws
      - traefik.http.middlewares.ws-stripprefix.stripprefix.forceslash=true
      - traefik.http.routers.ws.entrypoints=web
      - traefik.http.services.ws.loadbalancer.server.port=3100

  webhook:
    image: ${GOCHAT_IMAGE_WEBHOOK}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/webhook_config.yaml:/dist/config.yaml:ro
    depends_on:
      scylla:
        condition: service_healthy
      keydb:
        condition: service_started
      nats:
        condition: service_started
      etcd:
        condition: service_started
      migrations-postgres:
        condition: service_completed_successfully
      migrations-cassandra:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.webhook.rule=Host(`${APP_HOST}`) && PathPrefix(`/api/v1/webhook`)
      - traefik.http.routers.webhook.priority=140
      - traefik.http.routers.webhook.entrypoints=web
      - traefik.http.services.webhook.loadbalancer.server.port=3200

  indexer:
    image: ${GOCHAT_IMAGE_INDEXER}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/indexer_config.yaml:/dist/config.yaml:ro
    depends_on:
      indexer-nats:
        condition: service_started
      opensearch:
        condition: service_started

  embedder:
    image: ${GOCHAT_IMAGE_EMBEDDER}
    restart: unless-stopped
    logging: *go-service-logging
    environment: *otel-app-env
    volumes:
      - ../.generated/compose/config/embedder_config.yaml:/dist/config.yaml:ro
    depends_on:
      scylla:
        condition: service_healthy
      nats:
        condition: service_started
      keydb:
        condition: service_started
      migrations-postgres:
        condition: service_completed_successfully
      migrations-cassandra:
        condition: service_completed_successfully

  migrations-postgres:
    image: ${GOCHAT_IMAGE_MIGRATIONS}
    command:
      - -path=/migrations/postgres
      - -database=${PG_ADDRESS:-postgres://postgres:postgres@citus-master:5432/gochat?sslmode=disable}
      - up
    volumes:
      - ../helm/gochat/files/migrations/postgres:/migrations/postgres:ro
    depends_on:
      citus-init:
        condition: service_completed_successfully
    restart: on-failure

  migrations-cassandra:
    image: ${GOCHAT_IMAGE_MIGRATIONS}
    command:
      - -path=/migrations/cassandra
      - -database=${CASSANDRA_ADDRESS:-cassandra://scylla:9042/gochat?x-multi-statement=true}
      - up
    volumes:
      - ../helm/gochat/files/migrations/cassandra:/migrations/cassandra:ro
    depends_on:
      scylla:
        condition: service_healthy
    restart: on-failure

  scylla:
    image: ${SCYLLA_IMAGE:-scylladb/scylla:6.2}
    restart: unless-stopped
    environment:
      SCYLLA_DEVELOPER_MODE: "${SCYLLA_DEVELOPER_MODE:-1}"
    volumes:
      - scylla-data:/var/lib/scylla
      - ./init/init-scylladb.sh:/init-scylladb.sh:ro
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT now() FROM system.local;"]
      interval: 10s
      timeout: 10s
      retries: 20

  nats:
    image: ${NATS_IMAGE:-nats:2.10.22-alpine3.20}
    restart: unless-stopped

  indexer-nats:
    image: ${NATS_IMAGE:-nats:2.10.22-alpine3.20}
    restart: unless-stopped

  keydb:
    image: ${KEYDB_IMAGE:-eqalpha/keydb:alpine}
    restart: unless-stopped

  citus-master:
    image: ${CITUS_IMAGE:-citusdata/citus:13.0.3}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gochat}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    volumes:
      - citus-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gochat} --quiet"]
      interval: 10s
      timeout: 5s
      retries: 20

  citus-init:
    image: ${POSTGRES_CLIENT_IMAGE:-postgres:15-alpine}
    restart: "no"
    depends_on:
      citus-master:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        psql -h citus-master -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gochat} -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS citus;'

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.13.0}
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: 65536
        hard: 65536

  dashboards:
    image: ${OPENSEARCH_DASHBOARDS_IMAGE:-opensearchproject/opensearch-dashboards:2.13.0}
    restart: unless-stopped
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    environment:
      OPENSEARCH_HOSTS: http://opensearch:9200
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_started

  openobserve:
    image: ${OPENOBSERVE_IMAGE:-openobserve/openobserve:latest}
    restart: unless-stopped
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD}
    volumes:
      - openobserve-data:/data
    ports:
      - "${OPENOBSERVE_PORT:-5080}:5080"

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:latest}
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    environment:
      OPENOBSERVE_ORG: ${OPENOBSERVE_ORG}
      OPENOBSERVE_BASIC_AUTH: ${OPENOBSERVE_BASIC_AUTH}
      OPENOBSERVE_LOG_STREAM: ${OPENOBSERVE_LOG_STREAM}
      OPENOBSERVE_METRIC_STREAM: ${OPENOBSERVE_METRIC_STREAM}
      OPENOBSERVE_TRACE_STREAM: ${OPENOBSERVE_TRACE_STREAM}
    depends_on:
      openobserve:
        condition: service_started
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"
      - "${OTEL_COLLECTOR_FLUENTD_PORT:-24224}:24224"
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"

  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.0}
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "no"
      ETCD_ROOT_PASSWORD: ${ETCD_ROOT_PASSWORD}
      ETCD_ENABLE_V2: "false"
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_NAME: etcd

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-15T10-36-16Z}
    profiles: ["minio"]
    command: server /data --console-address :9001
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio-api.rule=Host(`${STORAGE_HOST}`)
      - traefik.http.routers.minio-api.entrypoints=web
      - traefik.http.routers.minio-api.priority=50
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      - traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)
      - traefik.http.routers.minio-console.entrypoints=web
      - traefik.http.routers.minio-console.priority=50
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-03-12T17-29-24Z}
    profiles: ["minio"]
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 2
        done
        mc mb --ignore-existing local/$$MINIO_BUCKET
        mc anonymous set download local/$$MINIO_BUCKET
        cat >/tmp/cors.xml <<'EOF'
        <CORSConfiguration>
          <CORSRule>
            <AllowedOrigin>*</AllowedOrigin>
            <AllowedMethod>GET</AllowedMethod>
            <AllowedMethod>HEAD</AllowedMethod>
            <AllowedMethod>PUT</AllowedMethod>
            <AllowedMethod>POST</AllowedMethod>
            <AllowedMethod>DELETE</AllowedMethod>
            <AllowedHeader>*</AllowedHeader>
            <ExposeHeader>ETag</ExposeHeader>
            <MaxAgeSeconds>3000</MaxAgeSeconds>
          </CORSRule>
        </CORSConfiguration>
        EOF
        mc cors set local/$$MINIO_BUCKET /tmp/cors.xml

volumes:
  citus-data:
  minio-data:
  openobserve-data:
  opensearch-data:
  scylla-data:
