name: CI and Release

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_name: gochat-deployer
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_name: gochat-deployer
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_name: gochat-deployer
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_name: gochat-deployer
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_name: gochat-deployer.exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            binary_name: gochat-deployer.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail

          asset="gochat-deployer_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          build_dir="$(mktemp -d)"
          dist_dir="$GITHUB_WORKSPACE/dist"
          mkdir -p "$dist_dir"

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags="-s -w" -o "${build_dir}/${{ matrix.binary_name }}" .

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            (
              cd "$build_dir"
              zip -q "$dist_dir/$asset" "${{ matrix.binary_name }}"
            )
          else
            tar -C "$build_dir" -czf "$dist_dir/$asset" "${{ matrix.binary_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gochat-deployer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gochat-deployer_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Release
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum gochat-deployer_* > gochat-deployer_checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          overwrite_files: true
          files: |
            dist/gochat-deployer_*.tar.gz
            dist/gochat-deployer_*.zip
            dist/gochat-deployer_checksums.txt
