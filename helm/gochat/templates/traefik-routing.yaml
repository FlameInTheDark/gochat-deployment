{{- if and .Values.ingress.enabled .Values.traefik.enabled .Values.routing.appHost }}
{{- $fullName := include "gochat.fullname" . -}}
{{- $middlewareNamespace := printf "%s-%s" .Release.Namespace $fullName -}}
{{- if .Values.ws.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullName }}-ws-stripprefix
  labels:
    {{- include "gochat.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /ws
    forceSlash: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-ws
  labels:
    {{- include "gochat.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "{{ $middlewareNamespace }}-ws-stripprefix@kubernetescrd"
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
{{- end }}
  rules:
    - host: {{ .Values.routing.appHost }}
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-ws
                port:
                  number: {{ .Values.ws.service.port }}
{{- end }}
{{- end }}
