{{- if .Values.embedder.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gochat.fullname" . }}-embedder
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "embedder") | nindent 4 }}
spec:
  replicas: {{ .Values.embedder.replicaCount }}
  selector:
    matchLabels:
      {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "embedder") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "embedder") | nindent 8 }}
    spec:
      containers:
        - name: embedder
          image: "{{ .Values.embedder.image.repository }}:{{ default .Values.global.imageVariant .Values.embedder.image.tag }}"
          imagePullPolicy: {{ .Values.embedder.image.pullPolicy }}
{{- if .Values.embedder.env }}
          env:
{{ toYaml .Values.embedder.env | indent 12 }}
{{- end }}
          volumeMounts:
            - name: config
              mountPath: /dist/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.embedder.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "gochat.fullname" . }}-embedder-config
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.embedder.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.embedder.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.embedder.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
