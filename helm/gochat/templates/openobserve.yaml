{{- if .Values.observability.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gochat.fullname" . }}-openobserve
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "openobserve") | nindent 4 }}
spec:
  type: {{ .Values.observability.openobserve.service.type }}
  ports:
    - name: http
      port: {{ .Values.observability.openobserve.service.port }}
      targetPort: {{ .Values.observability.openobserve.service.port }}
  selector:
    {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "openobserve") | nindent 4 }}
---
{{- if .Values.observability.openobserve.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gochat.fullname" . }}-openobserve
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "openobserve") | nindent 4 }}
  {{- with .Values.observability.openobserve.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.observability.openobserve.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.observability.openobserve.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.observability.openobserve.ingress.path }}
            pathType: {{ .Values.observability.openobserve.ingress.pathType }}
            backend:
              service:
                name: {{ include "gochat.fullname" . }}-openobserve
                port:
                  number: {{ .Values.observability.openobserve.service.port }}
  {{- with .Values.observability.openobserve.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- if .Values.observability.openobserve.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gochat.fullname" . }}-openobserve-data
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "openobserve") | nindent 4 }}
spec:
  accessModes:
{{- toYaml .Values.observability.openobserve.persistence.accessModes | nindent 4 }}
{{- if .Values.observability.openobserve.persistence.storageClass }}
  storageClassName: {{ .Values.observability.openobserve.persistence.storageClass | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.openobserve.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gochat.fullname" . }}-openobserve
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "openobserve") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "openobserve") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "openobserve") | nindent 8 }}
    spec:
      containers:
        - name: openobserve
          image: "{{ .Values.observability.openobserve.image.repository }}:{{ .Values.observability.openobserve.image.tag }}"
          imagePullPolicy: {{ .Values.observability.openobserve.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.observability.openobserve.service.port }}
              name: http
          env:
            - name: ZO_DATA_DIR
              value: /data
            - name: ZO_ROOT_USER_EMAIL
              value: {{ .Values.observability.openobserve.env.rootUserEmail | quote }}
            - name: ZO_ROOT_USER_PASSWORD
              value: {{ .Values.observability.openobserve.env.rootUserPassword | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.observability.openobserve.resources | nindent 12 }}
      volumes:
        - name: data
{{- if .Values.observability.openobserve.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gochat.fullname" . }}-openobserve-data
{{- else }}
          emptyDir: {}
{{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.observability.openobserve.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.observability.openobserve.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.observability.openobserve.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
