{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gochat.fullname" . }}-minio
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "minio") | nindent 4 }}
spec:
  type: {{ .Values.minio.service.type }}
  ports:
    - name: api
      port: {{ .Values.minio.service.apiPort }}
      targetPort: {{ .Values.minio.service.apiPort }}
  selector:
    {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "minio") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gochat.fullname" . }}-minio-console
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "minio-console") | nindent 4 }}
spec:
  type: {{ .Values.minio.consoleService.type }}
  ports:
    - name: console
      port: {{ .Values.minio.consoleService.port }}
      targetPort: {{ .Values.minio.service.consolePort }}
  selector:
    {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "minio") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gochat.fullname" . }}-minio
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "minio") | nindent 4 }}
spec:
  serviceName: {{ include "gochat.fullname" . }}-minio
  replicas: {{ .Values.minio.replicaCount }}
  selector:
    matchLabels:
      {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gochat.componentSelectorLabels" (dict "Context" . "Component" "minio") | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :{{ .Values.minio.service.consolePort }}
          ports:
            - containerPort: {{ .Values.minio.service.apiPort }}
              name: api
            - containerPort: {{ .Values.minio.service.consolePort }}
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
{{- if .Values.minio.extraEnv }}
{{ toYaml .Values.minio.extraEnv | indent 12 }}
{{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
{{- if not .Values.minio.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
{{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.minio.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.minio.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.minio.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.minio.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
{{ toYaml .Values.minio.persistence.accessModes | indent 10 }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
{{- if .Values.minio.persistence.storageClass }}
        storageClassName: {{ .Values.minio.persistence.storageClass }}
{{- end }}
{{- end }}
{{- end }}
