{{- if and .Values.ingress.enabled .Values.ws.enabled (not .Values.traefik.enabled) .Values.ingress.websocket.enabled }}
{{- $annotations := dict }}
{{- with .Values.ingress.websocket.annotations }}
{{- $annotations = merge $annotations . }}
{{- end }}
{{- if and (eq (lower (default "" .Values.ingress.className)) "nginx") (ne .Values.ingress.websocket.path "/subscribe") }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/rewrite-target" "/subscribe" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gochat.fullname" . }}-ws
  labels:
    {{- include "gochat.labels" . | nindent 4 }}
{{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
{{- end }}
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
{{- end }}
  rules:
    - host: {{ .Values.routing.appHost }}
      http:
        paths:
          - path: {{ .Values.ingress.websocket.path }}
            pathType: {{ .Values.ingress.websocket.pathType }}
            backend:
              service:
                name: {{ include "gochat.fullname" . }}-ws
                port:
                  number: {{ .Values.ws.service.port }}
{{- if .Values.ingress.tls }}
  tls:
{{- toYaml .Values.ingress.tls | nindent 4 }}
{{- end }}
{{- end }}
