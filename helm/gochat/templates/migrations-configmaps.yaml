{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gochat.fullname" . }}-postgres-migrations
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "migrations") | nindent 4 }}
data:
{{ (.Files.Glob "files/migrations/postgres/*").AsConfig | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gochat.fullname" . }}-cassandra-migrations
  labels:
    {{- include "gochat.componentLabels" (dict "Context" . "Component" "migrations") | nindent 4 }}
data:
{{ (.Files.Glob "files/migrations/cassandra/*").AsConfig | indent 2 }}
{{- end }}
