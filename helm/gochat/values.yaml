ui:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/flameinthedark/gochat-react
    tag: "" # Overrides global.imageVariant when set
    pullPolicy: IfNotPresent
  build:
    enabled: false
    repository: https://github.com/FlameInTheDark/gochat-react.git
    ref: main
    command: |
      bun install --frozen-lockfile
      bun run build
    cloneImage:
      repository: alpine/git
      tag: latest
      pullPolicy: IfNotPresent
    buildImage:
      repository: oven/bun
      tag: 1-alpine
      pullPolicy: IfNotPresent
    nginxConfig: |
      server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;
          index index.html;

          location / {
              try_files $uri $uri/ /index.html;
          }
      }
  service:
    type: ClusterIP
    port: 80
  env:
    VITE_WEBSOCKET_URL: "wss://example.com/ws/subscribe"
    VITE_API_BASE_URL: "https://example.com/api/v1"
    VITE_BASE_PATH: "/"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

