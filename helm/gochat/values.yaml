nameOverride: ""
fullnameOverride: ""

global:
  imageVariant: latest

imagePullSecrets: []

routing:
  appHost: example.com

scylla:
  enabled: true
  replicaCount: 1
  image:
    repository: scylladb/scylla
    tag: "6.2"
    pullPolicy: IfNotPresent
  dataMountPath: /var/lib/scylla
  developerMode: true
  service:
    type: ClusterIP
    ports:
      intra: 7000
      cql: 9042
      jmx: 7199
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  lifecycle:
    createKeyspace:
      enabled: true
      keyspace: gochat
      replicationClass: SimpleStrategy
      replicationFactor: 1

nats:
  enabled: true
  replicaCount: 1
  image:
    repository: nats
    tag: "2.10.22-alpine3.20"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      client: 4222
      monitoring: 8222
      route: 6222
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

indexerNats:
  enabled: true
  replicaCount: 1
  image:
    repository: nats
    tag: "2.10.22-alpine3.20"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      client: 4222
      monitoring: 8222
      route: 6222
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

keydb:
  enabled: true
  replicaCount: 1
  image:
    repository: eqalpha/keydb
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

auth:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/flameinthedark/gochat-auth
    tag: "" # Overrides global.imageVariant when set
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3100
  env: []
  config: |
    # App
    app_name: "GoChat"
    base_url: "http://example.com"

    # API
    server_address: ":3100"
    api_log: true
    idempotency_storage_lifetime: 10
    rate_limit_time: 1
    swagger: false
    rate_limit_requests: 20

    # Auth
    auth_secret: "change_me_before_use_it_in_production"

    # Email
    email_source: "no-reply@example.com"
    email_name: "no-reply"
    email_template: "./email_notify.tmpl"
    password_reset_template: "./password_reset.tmpl"
    email_provider: "smtp" # log | smtp | sendpulse | resend | dashamail
    sendpulse_user_id: ""
    sendpulse_secret: ""
    resend_api_key: ""
    dashamail_api_key: ""
    smtp_host: "host.docker.internal"
    smtp_port: 2525
    smtp_username: ""
    smtp_password: ""
    smtp_use_tls: false

    # Redis
    keydb: "gochat-keydb:6379"

    # PostgreSQL
    pg_dsn: "host=gochat-citus-master port=5432 user=postgres dbname=gochat sslmode=disable"
  emailTemplate: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Confirmation</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html, body {
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
                background-color: #18181b;
                color: #fafafa;
                padding: 32px 16px;
                -webkit-font-smoothing: antialiased;
            }

            .wrapper {
                max-width: 560px;
                margin: 0 auto;
            }

            /* App name / logo bar */
            .brand {
                text-align: center;
                padding-bottom: 24px;
            }

            .brand-name {
                font-size: 20px;
                font-weight: 700;
                color: #fafafa;
                letter-spacing: -0.3px;
            }

            /* Main card */
            .card {
                background-color: #27272a;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.10);
                overflow: hidden;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }

            /* Accent banner at the top of the card */
            .card-accent {
                height: 4px;
                background: rgba(255, 255, 255, 0.12);
            }

            .card-body {
                padding: 40px 40px 32px;
            }

            .card-title {
                font-size: 22px;
                font-weight: 700;
                color: #fafafa;
                margin-bottom: 8px;
                letter-spacing: -0.3px;
            }

            .card-subtitle {
                font-size: 14px;
                color: rgba(250, 250, 250, 0.5);
                margin-bottom: 24px;
            }

            .divider {
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
                margin: 24px 0;
            }

            .message {
                font-size: 15px;
                line-height: 1.65;
                color: rgba(250, 250, 250, 0.72);
                margin-bottom: 28px;
            }

            /* CTA button */
            .btn-wrap {
                text-align: center;
                margin-bottom: 28px;
            }

            .button {
                display: inline-block;
                padding: 13px 32px;
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
                font-size: 15px;
                font-weight: 600;
                color: #18181b !important;
                background: #fafafa;
                text-decoration: none;
                border-radius: 10px;
                letter-spacing: 0.1px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            }

            .note {
                font-size: 13px;
                color: rgba(250, 250, 250, 0.4);
                line-height: 1.6;
            }

            /* Footer */
            .footer {
                text-align: center;
                padding: 24px 16px 8px;
            }

            .footer p {
                font-size: 12px;
                color: rgba(250, 250, 250, 0.28);
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="brand">
                <span class="brand-name">{{.AppName}}</span>
            </div>

            <div class="card">
                <div class="card-accent"></div>
                <div class="card-body">
                    <h1 class="card-title">Confirm your email</h1>
                    <p class="card-subtitle">Welcome to {{.AppName}} — one step away!</p>

                    <div class="divider"></div>

                    <p class="message">
                        Hey there! Thanks for signing up. To activate your account and start chatting,
                        please verify your email address by clicking the button below.
                    </p>

                    <div class="btn-wrap">
                        <a href="{{.BaseURL}}/confirm/{{.UserId}}/{{.Token}}" class="button">Confirm Email Address</a>
                    </div>

                    <p class="note">
                        This link is unique to your account. If you didn't create an account with
                        {{.AppName}}, you can safely ignore this email.
                    </p>
                </div>
            </div>

            <div class="footer">
                <p>&copy; {{.Year}} {{.AppName}}. All rights reserved.</p>
            </div>
        </div>
    </body>
    </html>
  passwordResetTemplate: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Reset</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html, body {
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
                background-color: #18181b;
                color: #fafafa;
                padding: 32px 16px;
                -webkit-font-smoothing: antialiased;
            }

            .wrapper {
                max-width: 560px;
                margin: 0 auto;
            }

            /* App name / logo bar */
            .brand {
                text-align: center;
                padding-bottom: 24px;
            }

            .brand-name {
                font-size: 20px;
                font-weight: 700;
                color: #fafafa;
                letter-spacing: -0.3px;
            }

            /* Main card */
            .card {
                background-color: #27272a;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.10);
                overflow: hidden;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }

            /* Accent banner — destructive red for security context */
            .card-accent {
                height: 4px;
                background: #ef4444;
            }

            .card-body {
                padding: 40px 40px 32px;
            }

            .card-title {
                font-size: 22px;
                font-weight: 700;
                color: #fafafa;
                margin-bottom: 8px;
                letter-spacing: -0.3px;
            }

            .card-subtitle {
                font-size: 14px;
                color: rgba(250, 250, 250, 0.5);
                margin-bottom: 24px;
            }

            .divider {
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
                margin: 24px 0;
            }

            .message {
                font-size: 15px;
                line-height: 1.65;
                color: rgba(250, 250, 250, 0.72);
                margin-bottom: 28px;
            }

            /* CTA button */
            .btn-wrap {
                text-align: center;
                margin-bottom: 28px;
            }

            .button {
                display: inline-block;
                padding: 13px 32px;
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
                font-size: 15px;
                font-weight: 600;
                color: #fafafa !important;
                background: #ef4444;
                text-decoration: none;
                border-radius: 10px;
                letter-spacing: 0.1px;
                box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
            }

            /* Expiry notice box */
            .notice {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 12px 16px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.07);
                border-radius: 8px;
                margin-bottom: 20px;
            }

            .notice svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
                margin-top: 1px;
            }

            .notice-text {
                font-size: 13px;
                color: rgba(250, 250, 250, 0.5);
                line-height: 1.55;
            }

            .note {
                font-size: 13px;
                color: rgba(250, 250, 250, 0.4);
                line-height: 1.6;
            }

            /* Footer */
            .footer {
                text-align: center;
                padding: 24px 16px 8px;
            }

            .footer p {
                font-size: 12px;
                color: rgba(250, 250, 250, 0.28);
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="brand">
                <span class="brand-name">{{.AppName}}</span>
            </div>

            <div class="card">
                <div class="card-accent"></div>
                <div class="card-body">
                    <h1 class="card-title">Reset your password</h1>
                    <p class="card-subtitle">We received a password reset request for your account.</p>

                    <div class="divider"></div>

                    <p class="message">
                        Click the button below to choose a new password. If you didn't request a
                        reset, you can safely ignore this email — your password will remain unchanged.
                    </p>

                    <div class="btn-wrap">
                        <a href="{{.BaseURL}}/reset/{{.Token}}" class="button">Reset Password</a>
                    </div>

                    <div class="notice">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="9" stroke="rgba(250,250,250,0.4)" stroke-width="1.6"/>
                            <path d="M12 8v4" stroke="rgba(250,250,250,0.4)" stroke-width="1.6" stroke-linecap="round"/>
                            <circle cx="12" cy="16" r="0.8" fill="rgba(250,250,250,0.4)"/>
                        </svg>
                        <span class="notice-text">This reset link expires in <strong>24 hours</strong>. After that you'll need to request a new one.</span>
                    </div>

                    <p class="note">
                        If you have concerns or did not request this, please contact our support team.
                    </p>
                </div>
            </div>

            <div class="footer">
                <p>&copy; {{.Year}} {{.AppName}}. All rights reserved.</p>
            </div>
        </div>
    </body>
    </html>
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

api:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/flameinthedark/gochat-api
    tag: "" # Overrides global.imageVariant when set
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3100
  env: []
  config: |
    # App
    app_name: "GoChat"
    base_url: "http://example.com"
    content_hosts:
      - "https://cdn.example.com"
      - "https://storage.example.com"

    # API
    swagger: true
    api_log: true
    server_address: ":3100"
    rate_limit_time: 1
    rate_limit_requests: 10
    idempotency_storage_lifetime: 10 # seconds

    # Auth
    auth_secret: "change_me_before_use_it_in_production"

    # Cassandra
    cluster: ["gochat-scylla"]
    cluster_keyspace: "gochat"

    # Redis
    keydb: "gochat-keydb:6379"

    # PostgreSQL
    pg_dsn: "host=gochat-citus-master port=5432 user=postgres dbname=gochat sslmode=disable"
    pg_retries: 5

    # OpenSearch
    os_insecure_skip_verify: true
    os_addresses: ["http://gochat-opensearch:9200"]
    os_username: "admin"
    os_password: "CustOM-Pa55w0Rd"

    # NATS
    nats_conn_string: "nats://gochat-nats:4222"
    indexer_nats_conn_string: "nats://gochat-indexer-nats:4222"

    # Uploads / Attachments
    upload_limit: 50000000 # bytes
    attachment_ttl_minutes: 10

    voice_region: global # default region id
    voice_regions:
      - id: global
        name: Global
      - id: eu
        name: Europe (Frankfurt)
      - id: us-east
        name: US East (Ashburn)

    # Discovery for manually managed SFU instances
    etcd_endpoints:
      - "http://gochat-etcd:2379"
    etcd_prefix: "/gochat/sfu"
    # Optional etcd auth (recommended in production)
    etcd_username: "root"
    etcd_password: "changeme"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

