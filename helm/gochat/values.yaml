citus:
  enabled: true
  image:
    repository: citusdata/citus
    tag: "13.0.3"
    pullPolicy: IfNotPresent
  auth:
    postgresUser: postgres
    postgresPassword: postgres
    postgresDb: gochat
    hostAuthMethod: trust
  master:
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    service:
      type: ClusterIP
      port: 5432
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  worker:
    enabled: false
    replicaCount: 1
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  manager:
    enabled: false
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraVolumeMounts: []
    extraVolumes: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

ingress:
  enabled: false
  className: ""
  proxyBodySize: 50m
  annotations: {}
  websocket:
    enabled: true
    annotations: {}
    path: /ws/subscribe
    pathType: Prefix
  websocketAlias:
    enabled: false
    annotations: {}
    path: /ws
    pathType: Exact
  hosts:
    - host: example.com
      paths:
        - path: /api/v1/auth
          pathType: Prefix
          service: auth
          port: 3100
        - path: /api/v1/upload
          pathType: Prefix
          service: attachments
          port: 3200
        - path: /emoji
          pathType: Prefix
          service: attachments
          port: 3200
        - path: /api/v1/webhook
          pathType: Prefix
          service: webhook
          port: 3200
        - path: /api/v1
          pathType: Prefix
          service: api
          port: 3100
        - path: /
          pathType: Prefix
          service: ui
          port: 80
    - host: storage.example.com
      paths:
        - path: /
          pathType: Prefix
          service: minio
          port: 9000
    - host: minio.example.com
      paths:
        - path: /
          pathType: Prefix
          service: minio-console
          port: 9001
  tls: []

observability:
  enabled: false
  deploymentEnv: kubernetes
  openobserve:
    image:
      repository: openobserve/openobserve
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 5080
    ingress:
      enabled: false
      className: ""
      annotations: {}
      host: openobserve.example.com
      path: /
      pathType: Prefix
      tls: []
    env:
      rootUserEmail: root@example.com
      rootUserPassword: Complexpass#123
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  otelCollector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      grpcPort: 4317
      httpPort: 4318
      healthPort: 13133
    env:
      openobserveOrg: default
      openobserveBasicAuth: cm9vdEBleGFtcGxlLmNvbTpDb21wbGV4cGFzcyMxMjM=
      openobserveLogStream: gochat_logs
      openobserveMetricStream: gochat-metrics
      openobserveTraceStream: gochat_traces
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
